name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: |
          chmod +x scripts/build-app.sh
          VERSION=${{ steps.version.outputs.version }} CREATE_DMG=1 CREATE_ZIP=1 scripts/build-app.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AICP-${{ steps.version.outputs.version }}.dmg
          path: dist/AICP-${{ steps.version.outputs.version }}.dmg

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AICP-${{ steps.version.outputs.version }}.zip
          path: dist/AICP-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/AICP-${{ steps.version.outputs.version }}.dmg
            dist/AICP-${{ steps.version.outputs.version }}.zip
